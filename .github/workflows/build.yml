name: build

on:
  pull_request:
  push:
    tags: ["v*"]
  workflow_dispatch:

# If new commits land on the same PR/branch, cancel the older in-progress run
# instead of letting duplicate CI runs pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  binaries:
    # Heavy cross-platform packaging build: run on release tags or a manual
    # dispatch, not on every PR push. Use the Actions "Run workflow" button to
    # build/validate the bundle (incl. the Windows engine) on demand.
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # --- Bundle the Tesseract engine + a default language set so end users
      # need no separate, admin-requiring install. Languages come from
      # packaging/bundled_languages.txt (single source of truth, also read by the
      # spec). eng/osd ship from the engine install; the rest download from
      # tessdata_fast. Downloads retry and tolerate failure (a flaky pack is
      # skipped with a warning, never failing the release build). The Unix steps
      # export the engine + tessdata locations for the spec; Windows uses the
      # spec's default (Program Files) discovery.
      - name: Bundle Tesseract engine + languages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install --no-progress -y tesseract
          $tessdata = "C:\Program Files\Tesseract-OCR\tessdata"
          $base = "https://github.com/tesseract-ocr/tessdata_fast/raw/main"
          $langs = Get-Content packaging/bundled_languages.txt |
            ForEach-Object { ($_ -replace '#.*', '').Trim() } | Where-Object { $_ }
          $failed = @()
          foreach ($l in $langs) {
            $out = "$tessdata\$l.traineddata"
            if (Test-Path $out) { continue }   # keep the engine's own eng/osd
            $ok = $false
            for ($i = 0; $i -lt 3 -and -not $ok; $i++) {
              try {
                Invoke-WebRequest "$base/$l.traineddata" -OutFile $out -UseBasicParsing -TimeoutSec 60
                $ok = $true
              } catch { Start-Sleep 2 }
            }
            if (-not $ok) { $failed += $l }
          }
          Write-Host "tessdata holds $((Get-ChildItem "$tessdata\*.traineddata").Count) pack(s)."
          if ($failed.Count) { Write-Warning "Could not download: $($failed -join ', ')" }
      - name: Bundle Tesseract engine + languages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-osd
          bin="$(command -v tesseract)"
          tdir="$(dirname "$(find /usr/share /usr/local/share -name eng.traineddata 2>/dev/null | head -1)")"
          echo "engine=$bin tessdata=$tdir"
          base="https://github.com/tesseract-ocr/tessdata_fast/raw/main"
          failed=""
          while read -r raw; do
            l="$(echo "${raw%%#*}" | xargs)"; [ -z "$l" ] && continue
            [ -f "$tdir/$l.traineddata" ] && continue
            ok=""
            for i in 1 2 3; do
              sudo curl -fsSL "$base/$l.traineddata" -o "$tdir/$l.traineddata" && { ok=1; break; }
              sleep 2
            done
            [ -z "$ok" ] && failed="$failed $l"
          done < packaging/bundled_languages.txt
          echo "tessdata holds $(ls "$tdir"/*.traineddata | wc -l) pack(s). failed:$failed"
          echo "CURSBREAKER_TESSERACT_BIN=$bin" >> "$GITHUB_ENV"
          echo "CURSBREAKER_TESSDATA_DIR=$tdir" >> "$GITHUB_ENV"
      - name: Bundle Tesseract engine + languages (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install tesseract
          bin="$(command -v tesseract)"
          tdir="$(dirname "$(find /opt/homebrew/share /usr/local/share -name eng.traineddata 2>/dev/null | head -1)")"
          echo "engine=$bin tessdata=$tdir"
          base="https://github.com/tesseract-ocr/tessdata_fast/raw/main"
          failed=""
          while read -r raw; do
            l="$(echo "${raw%%#*}" | xargs)"; [ -z "$l" ] && continue
            [ -f "$tdir/$l.traineddata" ] && continue
            ok=""
            for i in 1 2 3; do
              curl -fsSL "$base/$l.traineddata" -o "$tdir/$l.traineddata" && { ok=1; break; }
              sleep 2
            done
            [ -z "$ok" ] && failed="$failed $l"
          done < packaging/bundled_languages.txt
          echo "tessdata holds $(ls "$tdir"/*.traineddata | wc -l) pack(s). failed:$failed"
          echo "CURSBREAKER_TESSERACT_BIN=$bin" >> "$GITHUB_ENV"
          echo "CURSBREAKER_TESSDATA_DIR=$tdir" >> "$GITHUB_ENV"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller
      - name: Build
        run: pyinstaller packaging/cursbreaker.spec
      - uses: actions/upload-artifact@v4
        with:
          name: cursbreaker-${{ matrix.os }}
          path: dist/*

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Tesseract engine
        # The engine binary lets the Printed-mode and word-box-refinement tests
        # run instead of skipping; without it the OCR-dependent cases skip.
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Smoke-check imports
        # Catch dependency/packaging breakage (e.g. a missing native wheel)
        # before it reaches users: the *real* Gemini path must import, not just
        # the mock-driven tests. This is the failure class the test suite misses
        # because it never imports the live SDK.
        run: python -c "import cursbreaker; from google import genai; print('imports OK')"
      - name: Run tests
        run: pytest -q
