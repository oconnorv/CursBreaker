name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller
      - name: Build
        run: pyinstaller packaging/cursebreaker.spec
      - uses: actions/upload-artifact@v4
        with:
          name: cursebreaker-${{ matrix.os }}
          path: dist/*

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pytest -q
