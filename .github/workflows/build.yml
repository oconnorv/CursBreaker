name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Tesseract engine (Windows, for bundling)
        # Phase 1: the Windows artifact ships the engine inside the .exe so end
        # users need no separate, admin-requiring install. The spec copies the
        # engine from this install into the bundle; on a runner without it the
        # build still succeeds but ships no engine.
        if: runner.os == 'Windows'
        run: choco install --no-progress -y tesseract
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller
      - name: Build
        run: pyinstaller packaging/cursbreaker.spec
      - uses: actions/upload-artifact@v4
        with:
          name: cursbreaker-${{ matrix.os }}
          path: dist/*

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Tesseract engine
        # The engine binary lets the Printed/Mixed-mode tests run instead of
        # skipping; without it the OCR-dependent cases are silently skipped.
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng
      - run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pytest -q
